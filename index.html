<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#9b7cb6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="时间管理">
    <meta name="mobile-web-app-capable" content="yes">
    <title>时间管理小助手</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(180deg, #c4b5e0 0%, #9b7cb6 50%, #7a5a9e 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding: 20px;
            padding-bottom: 30px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* 头部标题 */
        .header {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 0.95rem;
            color: #555;
            opacity: 0.8;
        }

        /* 卡片通用样式 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* 时间卡片 */
        .time-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px 20px;
        }

        .time-left {
            display: flex;
            align-items: baseline;
        }

        .time-display {
            font-size: 3.2rem;
            font-weight: 300;
            color: #333;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .time-ampm {
            font-size: 1rem;
            color: #666;
            margin-left: 5px;
            font-weight: 400;
        }

        .time-right {
            text-align: right;
        }

        .date-display {
            font-size: 1rem;
            color: #333;
            margin-bottom: 4px;
        }

        .weekday-display {
            font-size: 1rem;
            color: #666;
        }

        /* 日程安排卡片 */
        .schedule-card {
            padding: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .more-btn {
            color: #999;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* 输入框 */
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 8px;
        }

        .input-label {
            color: #666;
            font-size: 0.9rem;
            margin-right: 10px;
            white-space: nowrap;
        }

        .schedule-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            color: #333;
            background: transparent;
        }

        .schedule-input::placeholder {
            color: #bbb;
        }

        .add-btn {
            background: #9b7cb6;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .add-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        /* 日程列表 */
        .schedule-section-title {
            font-size: 1rem;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .timeline {
            position: relative;
        }

        .time-group {
            margin-bottom: 15px;
        }

        .time-group-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .period-label {
            writing-mode: vertical-lr;
            text-orientation: upright;
            font-size: 0.8rem;
            color: #666;
            margin-right: 15px;
            letter-spacing: 2px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .schedule-items {
            flex: 1;
        }

        .schedule-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .schedule-item:last-child {
            border-bottom: none;
        }

        .schedule-time {
            font-size: 0.95rem;
            color: #333;
            width: 50px;
            font-weight: 500;
        }

        .schedule-content {
            flex: 1;
            font-size: 0.95rem;
            color: #333;
        }

        .schedule-delete {
            color: #ccc;
            font-size: 1rem;
            cursor: pointer;
            padding: 5px;
        }

        .schedule-delete:active {
            color: #ff6b6b;
        }

        /* 底部功能区 */
        .bottom-section {
            display: grid;
            grid-template-columns: 1.2fr 0.9fr 0.9fr;
            gap: 10px;
        }

        .feature-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .feature-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .feature-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
        }

        /* 任务清单 */
        .task-stats {
            font-size: 0.7rem;
            color: #999;
            margin-bottom: 10px;
        }

        .task-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .task-tab {
            font-size: 0.7rem;
            color: #666;
            padding: 3px 8px;
            border-radius: 10px;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
        }

        .task-tab.active {
            background: #9b7cb6;
            color: white;
        }

        .task-list {
            max-height: 80px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            font-size: 0.8rem;
        }

        .task-checkbox {
            width: 16px;
            height: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-checkbox.checked {
            background: #9b7cb6;
            border-color: #9b7cb6;
            color: white;
            font-size: 10px;
        }

        .task-text {
            flex: 1;
            color: #333;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .add-task-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: #f5f5f5;
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #666;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        /* 倒计时 */
        .countdown-display {
            font-size: 2.2rem;
            font-weight: 300;
            color: #333;
            text-align: center;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }

        .countdown-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .count-btn {
            background: #f5f5f5;
            border: none;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .count-btn:active {
            background: #9b7cb6;
            color: white;
        }

        .count-btn.active {
            background: #9b7cb6;
            color: white;
        }

        /* 语音卡片 */
        .voice-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .voice-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c4b5e0 0%, #9b7cb6 100%);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 10px 0;
            box-shadow: 0 4px 15px rgba(155, 124, 182, 0.3);
            transition: all 0.2s;
        }

        .voice-btn:active {
            transform: scale(0.95);
        }

        .voice-btn.recording {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(155, 124, 182, 0.5); }
            50% { box-shadow: 0 0 0 15px rgba(155, 124, 182, 0); }
        }

        .voice-icon {
            font-size: 1.5rem;
            color: white;
        }

        .voice-hint {
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            line-height: 1.4;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%) scale(0.9);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 50%) scale(1);
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 4000;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 300px;
            width: 100%;
            animation: modalPop 0.3s;
        }

        @keyframes modalPop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .modal-message {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .modal-btn {
            background: #9b7cb6;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
        }

        .modal-btn:active {
            opacity: 0.9;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #bbb;
            font-size: 0.85rem;
        }

        /* 响应式 */
        @media (max-width: 380px) {
            .time-display {
                font-size: 2.8rem;
            }
            .bottom-section {
                grid-template-columns: 1fr;
            }
            .feature-card {
                display: flex;
                gap: 15px;
            }
            .voice-card {
                flex-direction: row;
            }
        }

        /* 语音结果弹窗 */
        .voice-result-modal {
            text-align: left;
        }

        .voice-result-title {
            font-weight: 600;
            color: #9b7cb6;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .voice-result-content {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .voice-actions {
            display: flex;
            gap: 10px;
        }

        .voice-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .voice-confirm {
            background: #9b7cb6;
            color: white;
        }

        .voice-cancel {
            background: #f0f0f0;
            color: #666;
        }

        /* 时间选择器 */
        .time-input-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .time-input {
            border: none;
            outline: none;
            font-size: 0.9rem;
            color: #666;
            background: transparent;
            width: 70px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>时间管理小助手</h1>
            <p>更温柔地安排每一天</p>
        </div>

        <!-- 时间卡片 -->
        <div class="card time-card">
            <div class="time-left">
                <span class="time-display" id="clock">10:09</span>
                <span class="time-ampm" id="ampm">AM</span>
            </div>
            <div class="time-right">
                <div class="date-display" id="date">2023年10月24日</div>
                <div class="weekday-display" id="weekday">星期二</div>
            </div>
        </div>

        <!-- 日程安排 -->
        <div class="card schedule-card">
            <div class="card-header">
                <span class="card-title">日程安排</span>
                <span class="more-btn">...</span>
            </div>

            <div class="input-row">
                <div class="input-wrapper">
                    <span class="input-label">安排内容</span>
                    <input type="text" class="schedule-input" id="scheduleInput" placeholder="请输入安排内容">
                </div>
                <button class="add-btn" onclick="addSchedule()">添加提醒 / 加入日程</button>
            </div>

            <div class="schedule-section-title">今日的优先提醒</div>

            <div class="timeline" id="scheduleList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 底部功能区 -->
        <div class="bottom-section">
            <!-- 任务清单 -->
            <div class="feature-card">
                <div class="feature-header">
                    <span class="feature-title">任务清单</span>
                    <span class="more-btn">...</span>
                </div>
                <div class="task-stats">
                    总计任务 <span id="totalCount">0</span> ·
                    待办 <span id="pendingCount">0</span> ·
                    已完成 <span id="completedCount">0</span>
                </div>
                <div class="task-tabs">
                    <button class="task-tab active" onclick="switchTaskTab('all', this)">全部</button>
                    <button class="task-tab" onclick="switchTaskTab('pending', this)">待办</button>
                    <button class="task-tab" onclick="switchTaskTab('completed', this)">已完成</button>
                </div>
                <div class="task-list" id="taskList">
                    <!-- 动态生成 -->
                </div>
                <button class="add-task-btn" onclick="showAddTaskModal()">
                    <span>+</span> 添加任务
                </button>
            </div>

            <!-- 快速倒计时 -->
            <div class="feature-card">
                <div class="feature-header">
                    <span class="feature-title">快速倒计时</span>
                </div>
                <div class="countdown-display" id="countdown">00:00</div>
                <div class="countdown-buttons">
                    <button class="count-btn" onclick="startCountdown(5)">5分钟</button>
                    <button class="count-btn" onclick="startCountdown(10)">10分钟</button>
                    <button class="count-btn" onclick="startCountdown(25)">25分钟</button>
                    <button class="count-btn" onclick="stopCountdown()">停止</button>
                </div>
            </div>

            <!-- 语音添加 -->
            <div class="feature-card voice-card">
                <div class="feature-title">语音添加</div>
                <button class="voice-btn" id="voiceBtn"
                    ontouchstart="startVoice(event)"
                    ontouchend="stopVoice(event)"
                    onmousedown="startVoice(event)"
                    onmouseup="stopVoice(event)"
                    onmouseleave="stopVoice(event)">
                    <span class="voice-icon">🎙</span>
                </button>
                <div class="voice-hint">
                    点击说出你的<br>提醒或任务
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 提醒弹窗 -->
    <div class="modal" id="alarmModal" onclick="closeAlarm()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-icon">⏰</div>
            <div class="modal-title" id="alarmTitle">时间到！</div>
            <div class="modal-message" id="alarmMessage">你的提醒时间到了</div>
            <button class="modal-btn" onclick="closeAlarm()">我知道了</button>
        </div>
    </div>

    <!-- 语音结果弹窗 -->
    <div class="modal" id="voiceModal">
        <div class="modal-content voice-result-modal">
            <div class="voice-result-title">识别结果</div>
            <div class="voice-result-content" id="voiceResultContent">
                <!-- 动态内容 -->
            </div>
            <div class="voice-actions">
                <button class="voice-confirm" onclick="confirmVoiceAdd()">确认添加</button>
                <button class="voice-cancel" onclick="closeVoiceModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 添加任务弹窗 -->
    <div class="modal" id="addTaskModal">
        <div class="modal-content">
            <div class="modal-title" style="margin-bottom: 15px;">添加新任务</div>
            <div style="margin-bottom: 15px;">
                <input type="text" id="newTaskInput" placeholder="输入任务内容"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem;">
            </div>
            <div class="voice-actions">
                <button class="voice-confirm" onclick="confirmAddTask()">添加</button>
                <button class="voice-cancel" onclick="closeAddTaskModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        // ==================== 用户配置区域 ====================
        // 请替换为你自己的 Firebase 配置（从 Firebase Console 获取）
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // ====================================================

        // 全局变量
        let tasks = [];
        let schedules = [];
        let countdownInterval = null;
        let currentTaskTab = 'all';
        let recognition = null;
        let voiceData = null;
        let db = null;
        let auth = null;
        let userId = null;
        let isFirebaseReady = false;
        let syncStatus = 'local'; // 'local', 'connecting', 'synced', 'error'

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            initSpeechRecognition();
            initApp();
        });

        // 初始化应用（本地存储 + Firebase）
        async function initApp() {
            // 第一步：加载本地数据
            loadFromLocalStorage();
            renderTasks();
            renderSchedules();
            updateTaskStats();
            checkReminders();
            setInterval(checkReminders, 1000);

            // 第二步：尝试初始化 Firebase
            if (firebaseConfig.apiKey !== 'YOUR_API_KEY') {
                try {
                    await initFirebase();
                } catch (error) {
                    console.error('Firebase 初始化失败:', error);
                    showToast('使用本地模式（数据不会同步）', 3000);
                }
            } else {
                console.log('Firebase 未配置，使用本地模式');
                showToast('本地模式运行（配置 Firebase 后可同步）', 3000);
            }
        }

        // 初始化 Firebase
        async function initFirebase() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                auth = getAuth(app);
                syncStatus = 'connecting';

                // 等待匿名登录
                await new Promise((resolve, reject) => {
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            userId = user.uid;
                            console.log('Firebase 登录成功:', userId);
                            resolve();
                        } else {
                            // 执行匿名登录
                            signInAnonymously(auth)
                                .then(() => resolve())
                                .catch(reject);
                        }
                    });
                });

                // 设置数据同步
                setupFirebaseSync();
                isFirebaseReady = true;
                syncStatus = 'synced';
                showToast('已连接云端，数据将自动同步', 2000);

            } catch (error) {
                console.error('Firebase 错误:', error);
                syncStatus = 'error';
                throw error;
            }
        }

        // 设置 Firebase 数据同步
        function setupFirebaseSync() {
            if (!userId || !db) return;

            const tasksRef = ref(db, `users/${userId}/tasks`);
            const schedulesRef = ref(db, `users/${userId}/schedules`);

            // 监听云端任务变化
            onValue(tasksRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // 将对象转换为数组
                    const cloudTasks = Object.entries(data).map(([id, item]) => ({
                        ...item,
                        id: parseInt(id) || id
                    }));
                    // 合并本地和云端数据（以云端为准）
                    tasks = cloudTasks;
                    saveToLocalStorage();
                    renderTasks();
                    updateTaskStats();
                }
            }, { onlyOnce: false });

            // 监听云端日程变化
            onValue(schedulesRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const cloudSchedules = Object.entries(data).map(([id, item]) => ({
                        ...item,
                        id: parseInt(id) || id
                    }));
                    schedules = cloudSchedules;
                    saveToLocalStorage();
                    renderSchedules();
                }
            }, { onlyOnce: false });

            // 同步本地数据到云端（首次连接时）
            syncLocalToFirebase();
        }

        // 同步本地数据到 Firebase
        async function syncLocalToFirebase() {
            if (!db || !userId) return;

            const localTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            const localSchedules = JSON.parse(localStorage.getItem('schedules') || '[]');

            if (localTasks.length > 0) {
                const tasksObj = {};
                localTasks.forEach(task => {
                    tasksObj[task.id] = task;
                });
                await set(ref(db, `users/${userId}/tasks`), tasksObj);
            }

            if (localSchedules.length > 0) {
                const schedulesObj = {};
                localSchedules.forEach(schedule => {
                    schedulesObj[schedule.id] = schedule;
                });
                await set(ref(db, `users/${userId}/schedules`), schedulesObj);
            }
        }

        // 保存任务到 Firebase
        async function saveTasksToFirebase() {
            if (!db || !userId || !isFirebaseReady) return;

            try {
                const tasksObj = {};
                tasks.forEach(task => {
                    tasksObj[task.id] = task;
                });
                await set(ref(db, `users/${userId}/tasks`), tasksObj);
            } catch (error) {
                console.error('保存任务失败:', error);
            }
        }

        // 保存日程到 Firebase
        async function saveSchedulesToFirebase() {
            if (!db || !userId || !isFirebaseReady) return;

            try {
                const schedulesObj = {};
                schedules.forEach(schedule => {
                    schedulesObj[schedule.id] = schedule;
                });
                await set(ref(db, `users/${userId}/schedules`), schedulesObj);
            } catch (error) {
                console.error('保存日程失败:', error);
            }
        }

        // 更新时钟
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;

            document.getElementById('clock').textContent = `${displayHours}:${minutes}`;
            document.getElementById('ampm').textContent = ampm;
            document.getElementById('date').textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
            document.getElementById('weekday').textContent = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'][now.getDay()];
        }

        // 初始化语音识别
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;

            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                document.getElementById('voiceBtn').classList.add('recording');
            };

            recognition.onend = () => {
                document.getElementById('voiceBtn').classList.remove('recording');
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                processVoiceInput(text);
            };

            recognition.onerror = () => {
                document.getElementById('voiceBtn').classList.remove('recording');
            };
        }

        function startVoice(e) {
            e.preventDefault();
            if (!recognition) {
                showToast('您的设备不支持语音识别');
                return;
            }
            try {
                recognition.start();
            } catch (err) {}
        }

        function stopVoice(e) {
            e.preventDefault();
            if (recognition) {
                try {
                    recognition.stop();
                } catch (err) {}
            }
        }

        // 解析语音
        function processVoiceInput(text) {
            const now = new Date();
            let type = 'task';
            let title = text;
            let time = null;

            // 判断是提醒还是任务
            if (text.includes('提醒') || text.includes('闹钟') || text.includes('叫我')) {
                type = 'schedule';
            }

            // 解析时间
            const minuteMatch = text.match(/(\d+)\s*分钟\s*后?/);
            if (minuteMatch) {
                time = new Date(now.getTime() + parseInt(minuteMatch[1]) * 60000);
                title = title.replace(/\d+\s*分钟\s*后?/, '').trim();
            }

            const hourMatch = text.match(/(\d+)\s*小时\s*后?/);
            if (hourMatch && !time) {
                time = new Date(now.getTime() + parseInt(hourMatch[1]) * 3600000);
                title = title.replace(/\d+\s*小时\s*后?/, '').trim();
            }

            // 清理标题
            title = title.replace(/^(提醒我|添加|我要|帮我|记一下)/, '').trim();

            voiceData = { type, title: title || '新事项', time };

            // 显示识别结果
            let content = `<strong>${type === 'schedule' ? '提醒' : '任务'}</strong>：${title}`;
            if (time) {
                content += `<br><strong>时间</strong>：${time.toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}`;
            }
            document.getElementById('voiceResultContent').innerHTML = content;
            document.getElementById('voiceModal').classList.add('show');
        }

        function confirmVoiceAdd() {
            if (!voiceData) return;

            if (voiceData.type === 'schedule' && voiceData.time) {
                schedules.push({
                    id: Date.now(),
                    title: voiceData.title,
                    time: voiceData.time.getTime(),
                    completed: false
                });
                saveSchedules();
                renderSchedules();
                showToast('提醒已添加');
            } else {
                tasks.push({
                    id: Date.now(),
                    title: voiceData.title,
                    completed: false,
                    createdAt: Date.now()
                });
                saveTasks();
                renderTasks();
                updateTaskStats();
                showToast('任务已添加');
            }

            closeVoiceModal();
        }

        function closeVoiceModal() {
            document.getElementById('voiceModal').classList.remove('show');
            voiceData = null;
        }

        // 添加日程
        function addSchedule() {
            const input = document.getElementById('scheduleInput');
            const title = input.value.trim();
            if (!title) return;

            // 尝试解析时间
            const now = new Date();
            let time = null;

            const timeMatch = title.match(/(\d{1,2})[:点：](\d{0,2})/);
            if (timeMatch) {
                time = new Date(now);
                time.setHours(parseInt(timeMatch[1]), parseInt(timeMatch[2]) || 0, 0, 0);
                if (time < now) time.setDate(time.getDate() + 1);
            }

            schedules.push({
                id: Date.now(),
                title: title.replace(/\d{1,2}[:点：]\d{0,2}/, '').trim() || title,
                time: time ? time.getTime() : null,
                completed: false
            });

            saveSchedules();
            renderSchedules();
            input.value = '';
            showToast('日程已添加');
        }

        // 渲染日程
        function renderSchedules() {
            const container = document.getElementById('scheduleList');
            const now = Date.now();

            // 过滤掉已完成的旧日程
            schedules = schedules.filter(s => !s.completed || s.time > now - 86400000);
            saveSchedules();

            // 按时间分组
            const groups = { morning: [], afternoon: [], evening: [] };

            schedules.filter(s => !s.completed).forEach(s => {
                if (s.time) {
                    const hour = new Date(s.time).getHours();
                    if (hour < 12) groups.morning.push(s);
                    else if (hour < 18) groups.afternoon.push(s);
                    else groups.evening.push(s);
                } else {
                    groups.morning.push(s);
                }
            });

            let html = '';

            if (groups.morning.length > 0) {
                html += renderTimeGroup('上午', groups.morning);
            }
            if (groups.afternoon.length > 0) {
                html += renderTimeGroup('下午', groups.afternoon);
            }
            if (groups.evening.length > 0) {
                html += renderTimeGroup('晚上', groups.evening);
            }

            if (html === '') {
                html = '<div class="empty-state">暂无日程安排</div>';
            }

            container.innerHTML = html;
        }

        function renderTimeGroup(period, items) {
            items.sort((a, b) => (a.time || 0) - (b.time || 0));

            return `
                <div class="time-group">
                    <div class="time-group-header">
                        <span class="period-label">${period}</span>
                        <div class="schedule-items">
                            ${items.map(item => `
                                <div class="schedule-item">
                                    <span class="schedule-time">${item.time ? new Date(item.time).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}) : '--:--'}</span>
                                    <span class="schedule-content">${escapeHtml(item.title)}</span>
                                    <span class="schedule-delete" onclick="deleteSchedule(${item.id})">×</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function deleteSchedule(id) {
            schedules = schedules.filter(s => s.id !== id);
            saveSchedules();
            renderSchedules();
        }

        // 任务功能
        function renderTasks() {
            const container = document.getElementById('taskList');
            let filtered = tasks;

            if (currentTaskTab === 'pending') {
                filtered = tasks.filter(t => !t.completed);
            } else if (currentTaskTab === 'completed') {
                filtered = tasks.filter(t => t.completed);
            }

            filtered = filtered.slice(0, 3); // 最多显示3个

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding: 10px;">暂无任务</div>';
                return;
            }

            container.innerHTML = filtered.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})">
                        ${task.completed ? '✓' : ''}
                    </div>
                    <span class="task-text">${escapeHtml(task.title)}</span>
                </div>
            `).join('');
        }

        function switchTaskTab(tab, btn) {
            currentTaskTab = tab;
            document.querySelectorAll('.task-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderTasks();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateTaskStats();
            }
        }

        function updateTaskStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('completedCount').textContent = completed;
        }

        function showAddTaskModal() {
            document.getElementById('addTaskModal').classList.add('show');
            setTimeout(() => document.getElementById('newTaskInput').focus(), 100);
        }

        function closeAddTaskModal() {
            document.getElementById('addTaskModal').classList.remove('show');
            document.getElementById('newTaskInput').value = '';
        }

        function confirmAddTask() {
            const input = document.getElementById('newTaskInput');
            const title = input.value.trim();
            if (!title) return;

            tasks.push({
                id: Date.now(),
                title,
                completed: false,
                createdAt: Date.now()
            });

            saveTasks();
            renderTasks();
            updateTaskStats();
            closeAddTaskModal();
            showToast('任务已添加');
        }

        // 倒计时
        function startCountdown(minutes) {
            stopCountdown();
            let seconds = minutes * 60;
            updateCountdownDisplay(seconds);

            // 更新按钮状态
            document.querySelectorAll('.count-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            countdownInterval = setInterval(() => {
                seconds--;
                updateCountdownDisplay(seconds);

                if (seconds <= 0) {
                    stopCountdown();
                    showAlarm(`${minutes}分钟倒计时结束`);
                }
            }, 1000);

            showToast(`${minutes}分钟倒计时开始`);
        }

        function stopCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            document.getElementById('countdown').textContent = '00:00';
            document.querySelectorAll('.count-btn').forEach(btn => btn.classList.remove('active'));
        }

        function updateCountdownDisplay(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('countdown').textContent = `${mins}:${secs}`;
        }

        // 提醒检查
        function checkReminders() {
            const now = Date.now();
            schedules.forEach(s => {
                if (!s.completed && s.time && s.time <= now && s.time > now - 60000) {
                    showAlarm(s.title);
                    s.completed = true;
                    saveSchedules();
                    renderSchedules();
                }
            });
        }

        function showAlarm(message) {
            document.getElementById('alarmTitle').textContent = '时间到！';
            document.getElementById('alarmMessage').textContent = message;
            document.getElementById('alarmModal').classList.add('show');

            // 播放提示音
            playSound();

            // 浏览器通知
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('⏰ 时间到！', { body: message });
            }
        }

        function closeAlarm() {
            document.getElementById('alarmModal').classList.remove('show');
        }

        function playSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.3, 0.6].forEach(delay => {
                    setTimeout(() => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = 800;
                        gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                        osc.start(audioContext.currentTime);
                        osc.stop(audioContext.currentTime + 0.2);
                    }, delay * 1000);
                });
            } catch (e) {}
        }

        // 工具函数
        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 保存任务（本地 + Firebase）
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            saveTasksToFirebase();
        }

        // 保存日程（本地 + Firebase）
        function saveSchedules() {
            localStorage.setItem('schedules', JSON.stringify(schedules));
            saveSchedulesToFirebase();
        }

        // 保存到本地存储
        function saveToLocalStorage() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            localStorage.setItem('schedules', JSON.stringify(schedules));
        }

        // 从本地存储加载
        function loadFromLocalStorage() {
            tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            schedules = JSON.parse(localStorage.getItem('schedules') || '[]');
        }

        // 回车提交
        document.getElementById('scheduleInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addSchedule();
        });

        document.getElementById('newTaskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') confirmAddTask();
        });
    </script>
</body>
</html>
